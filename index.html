<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://dailyd-backend.onrender.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <title>DailyD — Daily developer feed</title>
  <meta name="description"
    content="A minimal daily feed of developer articles on Java, Spring, MongoDB, Kafka and AI tools." />
  <meta name="author" content="DailyD" />

  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)" />

  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" href="/icon-512.png" type="image/png" />
  <link rel="apple-touch-icon" href="/icon-512.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="DailyD" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <meta property="og:title" content="DailyD" />
  <meta property="og:description"
    content="A minimal daily feed of developer articles on Java, Spring, MongoDB, Kafka and AI tools." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="/icon-512.png" />

  <meta name="twitter:card" content="summary" />
  <meta name="twitter:image" content="/icon-512.png" />

  <script>
    // Apply theme before React mounts to avoid flash.
    (function () {
      try {
        var t = localStorage.getItem('dailyd_theme');
        if (!t) t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        if (t === 'dark') document.documentElement.classList.add('dark');
      } catch (e) { }
    })();
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
