version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ./app:/workspace/app
    environment:
      - APP_ENV=development
      - DEBUG=true
      - CORS_ORIGINS=["http://localhost:5173", "http://localhost:3000"]
      # Placeholders for future phases
      # - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/dailyd
      # - REDIS_URL=redis://redis:6379/0
    restart: always

